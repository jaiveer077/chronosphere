version: '3.8'
services:
  # Database with PostGIS extension
  db:
    image: postgis/postgis:15-3.3
    restart: always
    environment:
      POSTGRES_USER: chrono_user
      POSTGRES_PASSWORD: chrono_password
      POSTGRES_DB: chronosphere_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
  # Redis for caching
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
  # Backend API
  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    # volumes:
    #   - ./backend:/app
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      PYTHONPATH: /app
      DATABASE_URL: postgresql+asyncpg://chrono_user:chrono_password@db:5432/chronosphere_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - db
      - redis
  # Frontend
  frontend:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host"
    ports:
      - "5173:5173"
    depends_on:
      - backend
volumes:
  postgres_data:
